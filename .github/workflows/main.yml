name: Allow Vibe to Push
on: workflow_dispatch
jobs:
  grant-access:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add Vibe as collaborator
        run: |
          curl -X PUT \
            -H "Authorization: token ${{ secrets.VIBE_GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/JEREMED/Global_Vibe_Dev/collaborators/vibe-code-assistant
            -d '{"message":"Created by Vibe","content":"'$(echo -n "# Nouveau fichier" | base64)'"}'
