name: Vibe Write Access
on: workflow_dispatch

jobs:
  create-file:
    runs-on: ubuntu-latest
    steps:
      - name: Create file via GitHub API
        run: |
          # Encode content in base64 (required by GitHub API)
          CONTENT=$(echo -n "Créé par Vibe - $(date)" | base64 -w 0)
          
          # Use curl to create the file
          curl -X PUT \
            -H "Authorization: token ${{ secrets.VIBE_GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/JEREMED/Global_Vibe_Dev/contents/vibe-test.md" \
            -d "{\"message\":\"Créé par Vibe\",\"content\":\"$CONTENT\"}"
